<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timeleyi Connect 💬</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: #2e2e3e;
      --accent: #c084fc;
      --accent2: #818cf8;
      --text: #f1f0f5;
      --text-muted: #7b7a90;
      --bubble-me: linear-gradient(135deg, #7c3aed, #6366f1);
      --bubble-them: #22222e;
      --radius: 18px;
      --font: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── ENTER SCREEN ── */
    #enter-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      padding: 24px;
      gap: 32px;
      background: var(--bg);
    }

    .enter-logo {
      font-size: 52px;
      line-height: 1;
    }

    .enter-title {
      text-align: center;
    }

    .enter-title h1 {
      font-size: 26px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .enter-title p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .enter-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }

    .enter-form input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .enter-form input:focus {
      border-color: var(--accent);
    }

    .enter-form input::placeholder {
      color: var(--text-muted);
    }

    .btn-enter {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-enter:hover { opacity: 0.9; }
    .btn-enter:active { transform: scale(0.98); }

    /* ── CHAT SCREEN ── */
    #chat-screen {
      display: none;
      flex-direction: column;
      height: 100dvh;
    }

    /* Header */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-info h2 {
      font-size: 15px;
      font-weight: 600;
    }

    .header-info span {
      font-size: 12px;
      color: #4ade80;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .username-badge {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Date separator */
    .date-sep {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin: 10px 0 4px;
      position: relative;
    }

    .date-sep::before, .date-sep::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: var(--border);
    }

    .date-sep::before { left: 0; }
    .date-sep::after { right: 0; }

    /* Bubble */
    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .msg-row.me {
      align-self: flex-end;
      align-items: flex-end;
    }

    .msg-row.them {
      align-self: flex-start;
      align-items: flex-start;
    }

    .msg-name {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 3px;
      padding: 0 4px;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }

    .me .bubble {
      background: var(--bubble-me);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .them .bubble {
      background: var(--bubble-them);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 4px;
    }

    /* Consecutive messages tighten radius */
    .msg-row.me .bubble + .bubble { border-top-right-radius: 4px; }
    .msg-row.them .bubble + .bubble { border-top-left-radius: 4px; }

    /* Typing indicator */
    #typing-indicator {
      padding: 0 16px 8px;
      font-size: 12px;
      color: var(--text-muted);
      min-height: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .typing-dots {
      display: flex;
      gap: 3px;
    }

    .typing-dots span {
      width: 5px;
      height: 5px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    /* Input bar */
    .input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      padding: 11px 14px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      max-height: 100px;
      overflow-y: auto;
    }

    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--text-muted); }

    .btn-send {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-send:hover { opacity: 0.9; }
    .btn-send:active { transform: scale(0.92); }

    .btn-send svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .empty-state .emoji { font-size: 36px; }

    /* Error toast */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #ef4444;
      color: white;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 999;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 480px) {
      .msg-row { max-width: 88%; }
    }

    /* ── NEW MESSAGE FLASH ── */
    @keyframes flashBg {
      0%   { background: var(--bg); }
      30%  { background: #2a1a40; }
      100% { background: var(--bg); }
    }

    body.flash {
      animation: flashBg 0.6s ease;
    }

    /* ── UNREAD BADGE on tab (visual cue) ── */
    .new-msg-banner {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      color: white;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }

    .new-msg-banner.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- ENTER SCREEN -->
<div id="enter-screen">
  <div class="enter-logo">💬</div>
  <div class="enter-title">
    <h1>Timeleyi Connect</h1>
    <p>Just the two of you — private &amp; real-time</p>
  </div>
  <div class="enter-form">
    <input type="text" id="name-input" placeholder="Enter your name" maxlength="20" autocomplete="off" />
    <button class="btn-enter" onclick="enterChat()">Start Chatting →</button>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <div class="chat-header">
    <div class="header-avatar">💑</div>
    <div class="header-info">
      <h2>Timeleyi Connect</h2>
      <span>● Private chat</span>
    </div>
    <div class="header-right">
      <div class="username-badge" id="my-name-badge"></div>
    </div>
  </div>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="emoji">💌</div>
      <span>No messages yet — say hello!</span>
    </div>
  </div>

  <div id="typing-indicator"></div>

  <div class="input-bar">
    <textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea>
    <button class="btn-send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<div id="toast"></div>
<div class="new-msg-banner" id="msg-banner"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase, ref, push, onChildAdded, serverTimestamp, onValue, set, remove
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAGcOzvSEnRmF6Gj5TsT1_oKXOD-reOmqU",
    authDomain: "timeleyi-connect.firebaseapp.com",
    databaseURL: "https://timeleyi-connect-default-rtdb.firebaseio.com",
    projectId: "timeleyi-connect",
    storageBucket: "timeleyi-connect.firebasestorage.app",
    messagingSenderId: "1025662784623",
    appId: "1:1025662784623:web:c571870318571a0609e99a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let myName = "";
  let typingTimer = null;
  let typingRef = null;
  let isFirstLoad = true;
  let originalTitle = "Timeleyi Connect 💬";
  let titleFlashInterval = null;
  let bannerTimer = null;

  // ── NOTIFICATION SOUND (Web Audio API — no file needed) ──
  function playPing() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();

      // First tone
      const o1 = ctx.createOscillator();
      const g1 = ctx.createGain();
      o1.connect(g1); g1.connect(ctx.destination);
      o1.frequency.value = 880;
      o1.type = "sine";
      g1.gain.setValueAtTime(0.3, ctx.currentTime);
      g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      o1.start(ctx.currentTime);
      o1.stop(ctx.currentTime + 0.3);

      // Second tone (harmony)
      const o2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      o2.connect(g2); g2.connect(ctx.destination);
      o2.frequency.value = 1100;
      o2.type = "sine";
      g2.gain.setValueAtTime(0, ctx.currentTime);
      g2.gain.setValueAtTime(0.2, ctx.currentTime + 0.15);
      g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      o2.start(ctx.currentTime + 0.15);
      o2.stop(ctx.currentTime + 0.5);
    } catch (e) {
      // Audio not supported — silent fail
    }
  }

  // ── TAB TITLE FLASH ──
  function flashTitle(senderName) {
    if (document.hasFocus()) return; // Don't flash if tab is active
    let toggle = true;
    clearInterval(titleFlashInterval);
    titleFlashInterval = setInterval(() => {
      document.title = toggle ? `💬 New message from ${senderName}!` : originalTitle;
      toggle = !toggle;
    }, 1000);

    // Stop flashing when user returns to tab
    window.addEventListener("focus", () => {
      clearInterval(titleFlashInterval);
      document.title = originalTitle;
    }, { once: true });
  }

  // ── BANNER NOTIFICATION ──
  function showBanner(senderName, text) {
    const banner = document.getElementById("msg-banner");
    const preview = text.length > 30 ? text.slice(0, 30) + "…" : text;
    banner.textContent = `💜 ${senderName}: ${preview}`;
    banner.classList.add("show");
    clearTimeout(bannerTimer);
    bannerTimer = setTimeout(() => banner.classList.remove("show"), 3000);
  }

  // ── SCREEN FLASH ──
  function flashScreen() {
    document.body.classList.remove("flash");
    void document.body.offsetWidth; // force reflow
    document.body.classList.add("flash");
    setTimeout(() => document.body.classList.remove("flash"), 600);
  }

  // ── ALLOWED NAMES ──
  const ALLOWED = ["TOLUWANMI12", "TIMILEYIN"];

  // ── ENTER CHAT ──
  window.enterChat = function () {
    const input = document.getElementById("name-input");
    const name = input.value.trim();

    if (!name) { showToast("Please enter your name"); return; }

    if (!ALLOWED.includes(name)) {
      input.style.borderColor = "#ef4444";
      showToast("❌ Access denied — name not recognised");
      setTimeout(() => { input.style.borderColor = ""; }, 1500);
      return;
    }

    myName = name;
    typingRef = ref(db, `typing/${myName}`);

    updateLastSeen();
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") updateLastSeen();
    });
    window.addEventListener("beforeunload", updateLastSeen);

    document.getElementById("enter-screen").style.display = "none";
    document.getElementById("chat-screen").style.display = "flex";
    document.getElementById("my-name-badge").textContent = name;

    listenMessages();
    listenTyping();
    listenLastSeen();
  };

  // ── LAST SEEN ──
  function updateLastSeen() {
    set(ref(db, `lastSeen/${myName}`), Date.now());
  }

  function listenLastSeen() {
    const otherName = ALLOWED.find(n => n !== myName);
    const statusEl = document.querySelector(".header-info span");

    onValue(ref(db, `lastSeen/${otherName}`), snapshot => {
      const ts = snapshot.val();
      if (!ts) {
        statusEl.style.color = "#7b7a90";
        statusEl.textContent = otherName + " hasn\'t joined yet";
        return;
      }
      const diff = Date.now() - ts;
      if (diff < 2 * 60 * 1000) {
        statusEl.style.color = "#4ade80";
        statusEl.textContent = "● Online";
      } else {
        statusEl.style.color = "#7b7a90";
        statusEl.textContent = "Last seen " + formatLastSeen(ts);
      }
    });
  }

  function formatLastSeen(ts) {
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60) return "just now";
    if (diff < 3600) { const m = Math.floor(diff / 60); return m + " min" + (m > 1 ? "s" : "") + " ago"; }
    if (diff < 86400) { const h = Math.floor(diff / 3600); return h + " hour" + (h > 1 ? "s" : "") + " ago"; }
    const d = new Date(ts);
    return d.toLocaleDateString([], { weekday: "short" }) + " at " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  // Allow Enter key on name input
  document.getElementById("name-input").addEventListener("keydown", e => {
    if (e.key === "Enter") window.enterChat();
  });

  // ── SEND MESSAGE ──
  window.sendMessage = async function () {
    const input = document.getElementById("msg-input");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    input.style.height = "auto";
    clearTyping();

    try {
      await push(ref(db, "messages"), {
        name: myName,
        text,
        time: serverTimestamp()
      });
    } catch (err) {
      showToast("Failed to send. Check connection.");
    }
  };

  // ── LISTEN MESSAGES ──
  function listenMessages() {
    const msgContainer = document.getElementById("messages");

    onChildAdded(ref(db, "messages"), snapshot => {
      const { name, text, time } = snapshot.val();
      const isMe = name === myName;
      const emptyState = document.getElementById("empty-state");
      if (emptyState) emptyState.remove();

      // 🔔 Notify only for incoming messages, skip history on first load
      if (!isFirstLoad && !isMe) {
        playPing();
        flashScreen();
        flashTitle(name);
        showBanner(name, text);
      }

      const row = document.createElement("div");
      row.className = `msg-row ${isMe ? "me" : "them"}`;

      if (!isMe) {
        const nameEl = document.createElement("div");
        nameEl.className = "msg-name";
        nameEl.textContent = name;
        row.appendChild(nameEl);
      }

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      row.appendChild(bubble);

      const timeEl = document.createElement("div");
      timeEl.className = "msg-time";
      timeEl.textContent = time ? formatTime(time) : "now";
      row.appendChild(timeEl);

      msgContainer.appendChild(row);
      msgContainer.scrollTop = msgContainer.scrollHeight;
    });

    // After 2s, all existing messages are loaded — new ones are truly new
    setTimeout(() => { isFirstLoad = false; }, 2000);
  }

  // ── TYPING INDICATOR ──
  const msgInput = document.getElementById("msg-input");

  msgInput.addEventListener("input", () => {
    // Auto resize textarea
    msgInput.style.height = "auto";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + "px";

    // Typing signal
    if (typingRef) set(typingRef, true);
    clearTimeout(typingTimer);
    typingTimer = setTimeout(clearTyping, 2000);
  });

  msgInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      window.sendMessage();
    }
  });

  function clearTyping() {
    if (typingRef) remove(typingRef);
  }

  function listenTyping() {
    onValue(ref(db, "typing"), snapshot => {
      const data = snapshot.val() || {};
      const others = Object.keys(data).filter(n => n !== myName);
      const indicator = document.getElementById("typing-indicator");

      if (others.length > 0) {
        indicator.innerHTML = `
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
          <span>${others[0]} is typing…</span>
        `;
      } else {
        indicator.innerHTML = "";
      }
    });
  }

  // ── HELPERS ──
  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
  }
</script>
</body>
</html>
